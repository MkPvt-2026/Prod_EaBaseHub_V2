<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการประชาสัมพันธ์ - EABaseHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <!-- Base CSS -->
    <link rel="stylesheet" href="/css/base/bassManager.css">
    <link rel="stylesheet" href="/css/pages/admin/Adminannouncements.css">
</head>
<body>
<!-- ═══════════════ HEADER ═══════════════ -->
<header class="app-header">
    <div class="logo">
        <div class="logo-circle">
            <img src="/assets/icons/icon-192.png" alt="logo">
        </div>
        <h2>EABaseHub</h2>
    </div>

    <div class="user-box">
        <div class="user-avatar" id="userAvatar">👤</div>
        <div class="user-info">
            <div class="user-name" id="userName">กำลังโหลด...</div>
        </div>
        <div class="group">
            <span class="badge badge--message-sent" onclick="logout()">
                <span class="badge-icon">
                    <span class="material-symbols-outlined" style="font-size:17px">logout</span>
                </span>
                ออกจากระบบ
            </span>
        </div>
    </div>
</header>

<!-- NAV -->
<nav class="app-nav">
    <a href="/pages/admin/adminDashboard.html">หน้าหลัก</a>
    <a href="/pages/reports/reportTracker.html">รายงานเข้าร้านค้า</a>
    <a href="/pages/admin/Adminannouncements.html" class="active">จัดการประชาสัมพันธ์</a>
</nav>

<main class="admin-announce-page">
    <h1>
        <span class="material-symbols-outlined">campaign</span>
        จัดการประชาสัมพันธ์
    </h1>

    <!-- Toolbar -->
    <div class="admin-announce-toolbar">
        <div class="admin-announce-filters">
            <button class="admin-announce-filter-btn active" data-filter="all">ทั้งหมด</button>
            <button class="admin-announce-filter-btn" data-filter="published">เผยแพร่แล้ว</button>
            <button class="admin-announce-filter-btn" data-filter="draft">แบบร่าง</button>
            <button class="admin-announce-filter-btn" data-filter="archived">เก็บถาวร</button>
        </div>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
            <div class="admin-announce-search">
                <span class="material-symbols-outlined">search</span>
                <input type="text" id="searchInput" placeholder="ค้นหาประกาศ...">
            </div>
            <button class="btn-create-announce" onclick="AdminAnnouncements.openForm()">
                <span class="material-symbols-outlined">add_circle</span>
                สร้างประกาศใหม่
            </button>
        </div>
    </div>

    <!-- Loading State -->
    <div class="admin-announce-loading" id="announceLoading">
        <div class="loading-spinner"></div>
        <p>กำลังโหลดข้อมูล...</p>
    </div>

    <!-- Table -->
    <div class="admin-announce-table-wrap" id="announceTableWrap" style="display:none">
        <table class="admin-announce-table">
            <thead>
                <tr>
                    <th style="width:40px">📌</th>
                    <th>หัวข้อ</th>
                    <th>หมวดหมู่</th>
                    <th>สถานะ</th>
                    <th>วันที่เผยแพร่</th>
                    <th>ผู้สร้าง</th>
                    <th style="width:120px">จัดการ</th>
                </tr>
            </thead>
            <tbody id="announceTableBody">
                <!-- Render by JS -->
            </tbody>
        </table>
        <div class="admin-announce-empty" id="announceEmpty" style="display:none">
            <span class="material-symbols-outlined">inbox</span>
            <p>ไม่พบประกาศ</p>
        </div>
    </div>
</main>

<!-- Create/Edit Form Modal -->
<div class="announce-form-overlay" id="announceFormOverlay">
    <div class="announce-form-modal" onclick="event.stopPropagation()">
        <div class="announce-form-header">
            <h2>
                <span class="material-symbols-outlined">edit_note</span>
                <span id="formTitle">สร้างประกาศใหม่</span>
            </h2>
            <button class="announce-form-close" onclick="AdminAnnouncements.closeForm()" type="button">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <div class="announce-form-body">
            <input type="hidden" id="formId">

            <div class="announce-form-group">
                <label>หัวข้อ <span class="required">*</span></label>
                <input type="text" id="formAnnounceTitle" placeholder="ระบุหัวข้อประกาศ" maxlength="200">
            </div>

            <div class="announce-form-group">
                <label>หมวดหมู่</label>
                <select id="formCategory">
                    <option value="general">ทั่วไป</option>
                    <option value="important">สำคัญ</option>
                    <option value="update">อัปเดต</option>
                    <option value="event">กิจกรรม</option>
                </select>
            </div>

            <div class="announce-form-group">
                <label>เนื้อหา</label>
                <textarea id="formContent" placeholder="เขียนเนื้อหาประกาศ..."></textarea>
            </div>

            <div class="announce-form-group">
                <label>รูปภาพหน้าปก</label>
                <input type="file" id="formCoverImage" accept="image/*" onchange="AdminAnnouncements.previewCover(this)">
                <img class="announce-cover-preview" id="coverPreview">
            </div>

            <div class="announce-form-group">
                <label>แนบไฟล์</label>
                <input type="file" id="formAttachment">
            </div>

            <div class="announce-form-group">
                <label>ลิงก์ภายนอก</label>
                <input type="url" id="formLink" placeholder="https://...">
            </div>

            <div class="announce-form-group">
                <div class="announce-toggle-row">
                    <label class="toggle-switch">
                        <input type="checkbox" id="formPinned">
                        <span class="toggle-slider"></span>
                    </label>
                    <span class="toggle-label">📌 ปักหมุดประกาศสำคัญ</span>
                </div>
            </div>
        </div>
        <div class="announce-form-footer">
            <button class="btn-form-cancel" onclick="AdminAnnouncements.closeForm()" type="button">ยกเลิก</button>
            <button class="btn-form-draft" onclick="AdminAnnouncements.save('draft')" type="button">
                บันทึกแบบร่าง
            </button>
            <button class="btn-form-publish" onclick="AdminAnnouncements.save('published')" type="button">
                เผยแพร่ประกาศ
            </button>
        </div>
    </div>
</div>

<!-- Toast Container -->
<div id="toastContainer"></div>

<!-- ═══════════════════════════════════════════════════════════════
     SCRIPTS
     ═══════════════════════════════════════════════════════════════ -->

<!-- 1. โหลด Supabase CDN ก่อน -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- 2. Initialize Supabase ทันที (ใส่ค่าของคุณ) -->
<script>
    // ═══════════════════════════════════════════════════════════════
    // ⚠️ แก้ไขค่านี้ให้ตรงกับ Supabase Project ของคุณ
    // ═══════════════════════════════════════════════════════════════
    const SUPABASE_URL = 'https://YOUR_PROJECT_ID.supabase.co';
    const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';
    
    // สร้าง client
    window.supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    console.log('✅ Supabase client initialized');
</script>

<!-- 3. Core Scripts -->
<script src="/js/core/userService.js"></script>
<script src="/js/core/auth.js"></script>

<!-- 4. Page Script - Inline เพื่อหลีกเลี่ยง 404 -->
<script>
/* =============================================
   EABaseHub: Admin Announcements Management
   ============================================= */

const AdminAnnouncements = (() => {
    'use strict';

    // ---- State ----
    let allAnnouncements = [];
    let currentFilter = 'all';
    let searchQuery = '';
    let editingId = null;
    let currentUser = null;

    // ---- Helpers ----
    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function formatDate(dateStr) {
        if (!dateStr) return '-';
        try {
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return '-';
            const months = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.',
                            'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
            return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear() + 543}`;
        } catch {
            return '-';
        }
    }

    function getCategoryLabel(cat) {
        const map = { general: 'ทั่วไป', important: 'สำคัญ', update: 'อัปเดต', event: 'กิจกรรม' };
        return map[cat] || 'ทั่วไป';
    }

    function getCategoryClass(cat) {
        const valid = ['general', 'important', 'update', 'event'];
        return valid.includes(cat) ? cat : 'general';
    }

    async function getSupabase() {
        if (window.supabaseClient) return window.supabaseClient;
        return new Promise((resolve, reject) => {
            let attempts = 0;
            const interval = setInterval(() => {
                attempts++;
                if (window.supabaseClient) {
                    clearInterval(interval);
                    resolve(window.supabaseClient);
                } else if (attempts >= 50) {
                    clearInterval(interval);
                    reject(new Error('Supabase not available'));
                }
            }, 100);
        });
    }

    function showToast(message, type = 'success') {
        let container = document.getElementById('toastContainer');
        if (!container) {
            container = document.createElement('div');
            container.id = 'toastContainer';
            container.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:99999;display:flex;flex-direction:column;gap:10px;';
            document.body.appendChild(container);
        }

        const colors = { success: '#16a34a', error: '#dc2626', warning: '#f59e0b' };
        const toast = document.createElement('div');
        toast.style.cssText = `
            padding: 12px 20px; border-radius: 10px;
            font-family: 'Kanit', sans-serif; font-size: 14px;
            color: #fff; box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            background: ${colors[type] || colors.success};
            animation: slideIn 0.3s ease;
        `;
        toast.textContent = message;
        container.appendChild(toast);

        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transition = 'opacity 0.3s';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    // ---- Loading States ----
    function setPageLoading(loading) {
        const loadingEl = document.getElementById('announceLoading');
        const tableWrap = document.getElementById('announceTableWrap');
        if (loadingEl) loadingEl.style.display = loading ? 'flex' : 'none';
        if (tableWrap) tableWrap.style.display = loading ? 'none' : 'block';
    }

    // ---- Fetch & Render ----
    async function fetchAll() {
        setPageLoading(true);
        try {
            const sb = await getSupabase();
            const { data, error } = await sb
                .from('announcements')
                .select('*')
                .order('is_pinned', { ascending: false })
                .order('created_at', { ascending: false });

            if (error) throw error;
            allAnnouncements = data || [];
            render();
        } catch (err) {
            console.error('[AdminAnnouncements] Fetch error:', err);
            showToast('โหลดข้อมูลผิดพลาด: ' + (err.message || ''), 'error');
        } finally {
            setPageLoading(false);
        }
    }

    function getFiltered() {
        let filtered = [...allAnnouncements];
        if (currentFilter !== 'all') {
            filtered = filtered.filter(a => a.status === currentFilter);
        }
        if (searchQuery) {
            const q = searchQuery.toLowerCase();
            filtered = filtered.filter(a =>
                (a.title || '').toLowerCase().includes(q) ||
                (a.content || '').toLowerCase().includes(q)
            );
        }
        return filtered;
    }

    function render() {
        const tbody = document.getElementById('announceTableBody');
        const empty = document.getElementById('announceEmpty');
        const filtered = getFiltered();

        if (!tbody) return;

        if (filtered.length === 0) {
            tbody.innerHTML = '';
            if (empty) empty.style.display = 'block';
            return;
        }

        if (empty) empty.style.display = 'none';
        
        tbody.innerHTML = filtered.map(item => {
            const safeId = escapeHtml(item.id);
            const safeTitle = escapeHtml(item.title || 'ไม่มีหัวข้อ');
            const safeContent = escapeHtml((item.content || '').substring(0, 60));
            const hasMore = (item.content || '').length > 60;
            const catClass = getCategoryClass(item.category);
            const catLabel = getCategoryLabel(item.category);
            const safeCreator = escapeHtml(item.created_by_name || '-');
            
            let statusHtml = '';
            const statusClass = item.status || 'unknown';
            switch (item.status) {
                case 'published':
                    statusHtml = '<span class="material-symbols-outlined">check_circle</span> เผยแพร่';
                    break;
                case 'draft':
                    statusHtml = '<span class="material-symbols-outlined">edit_note</span> แบบร่าง';
                    break;
                case 'archived':
                    statusHtml = '<span class="material-symbols-outlined">archive</span> เก็บถาวร';
                    break;
                default:
                    statusHtml = 'ไม่ระบุ';
            }

            return `
                <tr>
                    <td>
                        ${item.is_pinned ? '<span class="material-symbols-outlined pin-indicator">push_pin</span>' : ''}
                    </td>
                    <td class="td-title">
                        <span>${safeTitle}</span>
                        <small>${safeContent}${hasMore ? '...' : ''}</small>
                    </td>
                    <td>
                        <span class="announce-category category-${catClass}">${catLabel}</span>
                    </td>
                    <td>
                        <span class="status-badge status-${statusClass}">${statusHtml}</span>
                    </td>
                    <td>${formatDate(item.published_at || item.created_at)}</td>
                    <td>${safeCreator}</td>
                    <td>
                        <div class="admin-announce-actions">
                            <button class="btn-edit" title="แก้ไข" onclick="AdminAnnouncements.openForm('${safeId}')">
                                <span class="material-symbols-outlined">edit</span>
                            </button>
                            <button class="btn-pin" title="${item.is_pinned ? 'เลิกปักหมุด' : 'ปักหมุด'}" 
                                    onclick="AdminAnnouncements.togglePin('${safeId}', ${!item.is_pinned})">
                                <span class="material-symbols-outlined">${item.is_pinned ? 'push_pin' : 'keep'}</span>
                            </button>
                            <button class="btn-delete" title="ลบ" onclick="AdminAnnouncements.confirmDelete('${safeId}')">
                                <span class="material-symbols-outlined">delete</span>
                            </button>
                        </div>
                    </td>
                </tr>
            `;
        }).join('');
    }

    // ---- Form Operations ----
    function openForm(id) {
        editingId = id || null;
        const overlay = document.getElementById('announceFormOverlay');
        const titleEl = document.getElementById('formTitle');

        if (!overlay) return;

        if (id) {
            const item = allAnnouncements.find(a => a.id === id);
            if (!item) {
                showToast('ไม่พบประกาศ', 'error');
                return;
            }

            titleEl.textContent = 'แก้ไขประกาศ';
            document.getElementById('formId').value = item.id;
            document.getElementById('formAnnounceTitle').value = item.title || '';
            document.getElementById('formCategory').value = item.category || 'general';
            document.getElementById('formContent').value = item.content || '';
            document.getElementById('formLink').value = item.external_link || '';
            document.getElementById('formPinned').checked = item.is_pinned || false;

            const preview = document.getElementById('coverPreview');
            if (item.cover_image_url) {
                preview.src = item.cover_image_url;
                preview.classList.add('visible');
            } else {
                preview.classList.remove('visible');
            }
        } else {
            titleEl.textContent = 'สร้างประกาศใหม่';
            clearForm();
        }

        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeForm() {
        const overlay = document.getElementById('announceFormOverlay');
        if (overlay) overlay.classList.remove('active');
        document.body.style.overflow = '';
        editingId = null;
    }

    function clearForm() {
        ['formId', 'formAnnounceTitle', 'formContent', 'formLink'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.value = '';
        });
        const cat = document.getElementById('formCategory');
        if (cat) cat.value = 'general';
        const pin = document.getElementById('formPinned');
        if (pin) pin.checked = false;
        const cover = document.getElementById('formCoverImage');
        if (cover) cover.value = '';
        const attach = document.getElementById('formAttachment');
        if (attach) attach.value = '';
        const preview = document.getElementById('coverPreview');
        if (preview) preview.classList.remove('visible');
    }

    function previewCover(input) {
        const preview = document.getElementById('coverPreview');
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                preview.src = e.target.result;
                preview.classList.add('visible');
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // ---- Upload ----
    async function uploadFile(file, folder) {
        const sb = await getSupabase();
        const ext = file.name.split('.').pop();
        const fileName = `${folder}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;

        const { data, error } = await sb.storage
            .from('announcements')
            .upload(fileName, file, { cacheControl: '3600', upsert: false });

        if (error) throw error;

        const { data: urlData } = sb.storage
            .from('announcements')
            .getPublicUrl(fileName);

        return urlData.publicUrl;
    }

    // ---- Save ----
    async function save(status) {
        const title = document.getElementById('formAnnounceTitle')?.value.trim();
        if (!title) {
            showToast('กรุณาระบุหัวข้อประกาศ', 'warning');
            return;
        }

        try {
            const sb = await getSupabase();
            const coverFile = document.getElementById('formCoverImage')?.files[0];
            const attachFile = document.getElementById('formAttachment')?.files[0];

            const existing = editingId ? allAnnouncements.find(a => a.id === editingId) : null;

            let cover_image_url = existing?.cover_image_url || null;
            let attachment_url = existing?.attachment_url || null;
            let attachment_name = existing?.attachment_name || null;

            if (coverFile) {
                cover_image_url = await uploadFile(coverFile, 'covers');
            }
            if (attachFile) {
                attachment_url = await uploadFile(attachFile, 'attachments');
                attachment_name = attachFile.name;
            }

            const payload = {
                title,
                category: document.getElementById('formCategory')?.value || 'general',
                content: document.getElementById('formContent')?.value.trim() || '',
                external_link: document.getElementById('formLink')?.value.trim() || null,
                is_pinned: document.getElementById('formPinned')?.checked || false,
                cover_image_url,
                attachment_url,
                attachment_name,
                status,
                updated_at: new Date().toISOString(),
            };

            if (editingId) {
                if (status === 'published' && existing?.status !== 'published') {
                    payload.published_at = new Date().toISOString();
                }
                const { error } = await sb.from('announcements').update(payload).eq('id', editingId);
                if (error) throw error;
                showToast('อัปเดตประกาศสำเร็จ');
            } else {
                if (status === 'published') {
                    payload.published_at = new Date().toISOString();
                }
                payload.created_by = currentUser?.id || null;
                payload.created_by_name = currentUser?.full_name || currentUser?.display_name || 'Admin';
                const { error } = await sb.from('announcements').insert(payload);
                if (error) throw error;
                showToast(status === 'published' ? 'เผยแพร่สำเร็จ' : 'บันทึกแบบร่างสำเร็จ');
            }

            closeForm();
            await fetchAll();
        } catch (err) {
            console.error('[AdminAnnouncements] Save error:', err);
            showToast('บันทึกผิดพลาด: ' + (err.message || ''), 'error');
        }
    }

    // ---- Toggle Pin ----
    async function togglePin(id, pinState) {
        try {
            const sb = await getSupabase();
            const { error } = await sb
                .from('announcements')
                .update({ is_pinned: pinState, updated_at: new Date().toISOString() })
                .eq('id', id);
            if (error) throw error;
            showToast(pinState ? 'ปักหมุดแล้ว' : 'เลิกปักหมุดแล้ว');
            await fetchAll();
        } catch (err) {
            console.error('[AdminAnnouncements] Pin error:', err);
            showToast('ผิดพลาด', 'error');
        }
    }

    // ---- Delete ----
    function confirmDelete(id) {
        const item = allAnnouncements.find(a => a.id === id);
        if (!item) return;

        const overlay = document.createElement('div');
        overlay.className = 'confirm-overlay';
        overlay.innerHTML = `
            <div class="confirm-box">
                <span class="material-symbols-outlined">warning</span>
                <h3>ลบประกาศนี้?</h3>
                <p>"${escapeHtml(item.title)}"<br>การลบจะไม่สามารถกู้คืนได้</p>
                <div class="confirm-buttons">
                    <button class="btn-cancel" onclick="this.closest('.confirm-overlay').remove()">ยกเลิก</button>
                    <button class="btn-danger" id="confirmDeleteBtn">ลบประกาศ</button>
                </div>
            </div>
        `;
        document.body.appendChild(overlay);

        document.getElementById('confirmDeleteBtn').onclick = async () => {
            overlay.remove();
            try {
                const sb = await getSupabase();
                const { error } = await sb.from('announcements').delete().eq('id', id);
                if (error) throw error;
                showToast('ลบสำเร็จ');
                await fetchAll();
            } catch (err) {
                showToast('ลบผิดพลาด', 'error');
            }
        };
    }

    // ---- Filter & Search ----
    function setupFilterButtons() {
        document.querySelectorAll('.admin-announce-filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.admin-announce-filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                render();
            });
        });
    }

    function setupSearch() {
        const input = document.getElementById('searchInput');
        if (!input) return;
        let timeout;
        input.addEventListener('input', () => {
            clearTimeout(timeout);
            timeout = setTimeout(() => {
                searchQuery = input.value.trim();
                render();
            }, 300);
        });
    }

    // ---- Init ----
    async function init() {
        try {
            currentUser = window.currentUser || null;
            setupFilterButtons();
            setupSearch();
            await fetchAll();

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeForm();
            });

            // Click outside modal
            const overlay = document.getElementById('announceFormOverlay');
            if (overlay) {
                overlay.addEventListener('click', (e) => {
                    if (e.target === overlay) closeForm();
                });
            }

            console.log('✅ AdminAnnouncements initialized');
        } catch (err) {
            console.error('[AdminAnnouncements] Init error:', err);
        }
    }

    // Auto-init
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }

    return {
        openForm,
        closeForm,
        save,
        togglePin,
        confirmDelete,
        previewCover,
        refresh: fetchAll,
    };
})();
</script>
