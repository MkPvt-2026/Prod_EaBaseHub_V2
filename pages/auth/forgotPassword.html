<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EABaseHub - ลืมรหัสผ่าน</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- ใช้ CSS เดียวกับ login -->
  <link rel="stylesheet" href="/css/pages/auth/login.css">

  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
</head>

<body>

<!-- SPLASH SCREEN -->
<div id="splash-screen">
  <div class="splash-logo">
    <img src="/assets/icons/icon-192.png" alt="logo">
  </div>
  <div class="splash-title">EABaseHub</div>
  <div class="splash-sub">ศูนย์รวมข้อมูลและระบบงาน</div>
  <div class="splash-dots">
    <span></span><span></span><span></span>
  </div>
</div>

<!-- SUCCESS OVERLAY -->
<div id="forgot-overlay">
  <div class="overlay-box">
    <div class="overlay-icon" style="color: #4caf8a; font-size: 48px;">
      <i class="fa-solid fa-envelope-circle-check"></i>
    </div>
    <h3>ส่งลิงก์เรียบร้อย!</h3>
    <p>กรุณาตรวจสอบอีเมลของคุณ</p>
  </div>
</div>

<!-- CARD -->
<div class="login-wrapper">
  <div class="login-card">

    <!-- Logo -->
    <div class="logo">
      <img src="/assets/icons/icon-192.png" alt="logo">
      <h1>ลืมรหัสผ่าน</h1>
      <p>กรอกอีเมลเพื่อรับลิงก์รีเซ็ตรหัสผ่าน</p>
    </div>

    <!-- Form -->
    <form id="forgotForm">
      <div class="form-group">
        <label for="email">อีเมล</label>
        <div class="input-box">
          <i class="fa-regular fa-envelope icon-left"></i>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="กรอกอีเมลที่ใช้สมัคร"
            autocomplete="email"
            required
          />
        </div>
      </div>

      <button type="submit" id="forgotBtn" class="btn-login">
        <span class="btn-text">ส่งลิงก์รีเซ็ตรหัสผ่าน</span>
        <span class="spinner"></span>
      </button>
    </form>

    <div class="register">
      จำรหัสผ่านได้แล้ว? <a href="/pages/auth/login.html">กลับไปเข้าสู่ระบบ</a>
    </div>

    <!-- Info box -->
    <div style="
      margin-top: 20px;
      padding: 14px;
      background: #f0f9f4;
      border-left: 3px solid #4caf8a;
      border-radius: 6px;
      font-size: 13px;
      color: #2d6b52;
      line-height: 1.6;
    ">
      <i class="fa-solid fa-circle-info" style="margin-right: 6px;"></i>
      <strong>วิธีใช้งาน:</strong><br>
      1. กรอกอีเมลที่คุณใช้สมัครสมาชิก<br>
      2. ตรวจสอบอีเมลของคุณ (รวมถึงโฟลเดอร์ Spam)<br>
      3. คลิกลิงก์ในอีเมลเพื่อตั้งรหัสผ่านใหม่
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="/js/core/supabaseClient.js"></script>
<script src="/js/pages/auth/forgot-password.js"></script>

</body>
</html>
