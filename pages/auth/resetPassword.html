<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EABaseHub - ตั้งรหัสผ่านใหม่</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/css/pages/auth/login.css">

  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
</head>

<body>

<!-- SPLASH -->
<div id="splash-screen">
  <div class="splash-logo">
    <img src="/assets/icons/icon-192.png" alt="logo">
  </div>
  <div class="splash-title">EABaseHub</div>
  <div class="splash-sub">ศูนย์รวมข้อมูลและระบบงาน</div>
  <div class="splash-dots">
    <span></span><span></span><span></span>
  </div>
</div>

<!-- SUCCESS OVERLAY -->
<div id="reset-overlay">
  <div class="overlay-box">
    <div class="overlay-icon" style="color: #4caf8a; font-size: 48px;">
      <i class="fa-solid fa-circle-check"></i>
    </div>
    <h3>เปลี่ยนรหัสผ่านสำเร็จ!</h3>
    <p>กำลังนำคุณไปยังหน้า Login</p>
  </div>
</div>

<!-- CARD -->
<div class="login-wrapper">
  <div class="login-card">

    <!-- Logo -->
    <div class="logo">
      <img src="/assets/icons/icon-192.png" alt="logo">
      <h1>ตั้งรหัสผ่านใหม่</h1>
      <p id="userEmail" style="color: #666; font-size: 14px;">กำลังตรวจสอบลิงก์...</p>
    </div>

    <!-- Loading state (กำลัง verify token) -->
    <div id="loading-state" style="text-align: center; padding: 30px 0;">
      <i class="fa-solid fa-spinner fa-spin" style="font-size: 32px; color: #4caf8a;"></i>
      <p style="margin-top: 12px; color: #666;">กำลังตรวจสอบลิงก์...</p>
    </div>

    <!-- Error state (token ไม่ถูกต้อง / หมดอายุ) -->
    <div id="error-state" style="display: none; text-align: center; padding: 20px 0;">
      <i class="fa-solid fa-circle-exclamation" style="font-size: 40px; color: #ef5350;"></i>
      <h3 style="margin: 16px 0 8px; color: #d32f2f;">ลิงก์ไม่ถูกต้องหรือหมดอายุ</h3>
      <p id="error-message" style="color: #666; font-size: 14px; line-height: 1.6;"></p>
      <a href="/pages/auth/forgot-password.html" class="btn-login" style="
        margin-top: 20px;
        display: inline-block;
        text-decoration: none;
      ">
        ขอลิงก์ใหม่
      </a>
    </div>

    <!-- Form (แสดงเมื่อ verify สำเร็จ) -->
    <form id="resetForm" style="display: none;">
      <div class="form-group">
        <label for="newPassword">รหัสผ่านใหม่</label>
        <div class="input-box">
          <i class="fa-solid fa-lock icon-left"></i>
          <input
            type="password"
            id="newPassword"
            placeholder="อย่างน้อย 8 ตัวอักษร"
            autocomplete="new-password"
            required
          />
          <button type="button" class="icon-btn" onclick="togglePass('newPassword', this)">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">ยืนยันรหัสผ่าน</label>
        <div class="input-box">
          <i class="fa-solid fa-lock icon-left"></i>
          <input
            type="password"
            id="confirmPassword"
            placeholder="กรอกรหัสผ่านอีกครั้ง"
            autocomplete="new-password"
            required
          />
          <button type="button" class="icon-btn" onclick="togglePass('confirmPassword', this)">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" id="resetBtn" class="btn-login">
        <span class="btn-text">บันทึกรหัสผ่านใหม่</span>
        <span class="spinner"></span>
      </button>
    </form>

    <div class="register">
      <a href="/pages/auth/login.html">กลับไปเข้าสู่ระบบ</a>
    </div>
  </div>
</div>

<script src="/js/core/supabaseClient.js"></script>
<script src="/js/pages/auth/reset-password.js"></script>

<script>
  function togglePass(fieldId, btn) {
    const field = document.getElementById(fieldId);
    const type = field.type === "password" ? "text" : "password";
    field.type = type;
    btn.innerHTML = type === "password"
      ? '<i class="fa-regular fa-eye"></i>'
      : '<i class="fa-regular fa-eye-slash"></i>';
  }
</script>

</body>
</html>
