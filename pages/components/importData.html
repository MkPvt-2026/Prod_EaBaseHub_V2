<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">

    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

</head>
<body>
    <!-- Navigation -->
    <!-- <nav class="app-nav">
        <a href="/pages/dashboard/managerDashboard1.html">หน้าหลัก</a>
        <a href="/pages/reports/reportTracker.html">รายงานเยี่ยมร้านค้า</a>
        <a href="/pages/components/importData.html" class="active">นำเข้าข้อมูล</a>
    </nav> -->


    <!-- โหลด Nav ตาม Role -->
<div id="navContainer"></div>      

    <div class="header">
        <div class="header-content">
            <button class="btn-back" onclick="history.back()" title="กลับ">
                <span class="material-icons">arrow_back</span>
            </button>
            <h1>
                <span class="material-icons">transform</span> 
                นำเข้าข้อมูล - แปลงรายงานยอดขาย
            </h1>
            <span id="userName" style="margin-left: auto; color: #7a9cc0;"></span>
        </div>
    </div>

    <div class="container">
        <!-- Upload Section -->
        <div class="card">
            <h2 class="section-title">
                <span class="material-icons">upload_file</span> 
                1. อัพโหลดไฟล์รายงาน
            </h2>
            
            <div class="upload-area" id="uploadArea">
                <div style="font-size: 4rem; color: #3a7d44; margin-bottom: 1rem">📊</div>
                <h3>ลากไฟล์มาวางที่นี่ หรือคลิกเพื่อเลือก</h3>
                <p style="margin-top: 0.5rem; color: #666">รองรับ Excel (.xlsx, .xls) และ CSV</p>
                <input type="file" id="fileInput" accept=".csv,.xlsx,.xls">
            </div>
            
            <div id="alert" class="alert"></div>
        </div>

        <!-- Process Log Section -->
        <div class="card hidden" id="processCard">
            <h2 class="section-title">
                <span class="material-icons">assignment</span> 
                2. กำลังประมวลผล
            </h2>
            <div id="processLog" class="process-log"></div>
        </div>

        <!-- Preview Section -->
        <div class="card hidden" id="previewCard">
            <h2 class="section-title">
                <span class="material-icons">preview</span> 
                3. ข้อมูลที่แปลงแล้ว
            </h2>
            
            <!-- Stats Grid -->
            <div id="statsGrid" class="stats-grid"></div>

            <!-- Column Selector -->
            <div class="column-selector">
                <strong>🎯 เลือก Column ที่ต้องการแสดง:</strong>
                <div id="columnCheckboxes" style="margin-top: 0.5rem;"></div>
            </div>

            <!-- Filter Bar -->
            <div class="filter-bar">
                <span><strong>🔍 กรองข้อมูล:</strong></span>
                <select id="filterSales">
                    <option value="">-- ทุกพนักงาน --</option>
                </select>
                <select id="filterCustomer">
                    <option value="">-- ทุกลูกค้า --</option>
                </select>
                <input type="text" id="searchProduct" placeholder="ค้นหาสินค้า..." style="min-width: 200px;">
                <button class="btn btn-small btn-secondary" id="clearFilterBtn">
                    <span class="material-icons" style="font-size: 1rem;">clear</span> 
                    ล้าง Filter
                </button>
            </div>

            <!-- Display Count -->
            <p style="color: #666; margin: 0.5rem 0;">
                แสดง <span id="displayCount">0</span> จาก <span id="totalCount">0</span> รายการ
            </p>
            
            <!-- Table -->
            <div class="table-wrapper">
                <table>
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>

            <!-- Actions -->
            <div class="actions">
                <button class="btn" id="importToSupabaseBtn">
                    <span class="material-icons">cloud_upload</span> 
                    บันทึกลง Supabase
                </button>
                <button class="btn" id="exportBtn">
                    <span class="material-icons">download</span> 
                    Export CSV
                </button>
                <button class="btn btn-danger" id="clearBtn">
                    <span class="material-icons">clear</span> 
                    ล้างข้อมูล
                </button>
            </div>
        </div>
    </div>

    <!-- Core Scripts -->
    <script src="/js/core/supabaseClient.js"></script>
    <script src="/js/core/userService.js"></script>
    <script src="/js/core/auth.js"></script>
    
    <!-- Main Script -->
    <script src="/js/pages/dashboard/importData.js"></script>


    <!-- ✅ โหลด nav + ดึง role จาก Supabase -->
<script>
async function loadNav(role) {
    const navFiles = {
        admin: "/pages/components/nav-admin.html",
        manager: "/pages/components/nav-manager.html"
    };

    const file = navFiles[role];

    if (!file) {
        console.warn("ไม่มี nav สำหรับ role:", role);
        return;
    }

    console.log("LOAD NAV FILE =", file);

    try {
        const res = await fetch(file);

        if (!res.ok) {
            console.error("โหลด nav ไม่ได้:", file);
            return;
        }

        const html = await res.text();
        document.getElementById("navContainer").innerHTML = html;
        setActiveMenu();
    } catch (err) {
        console.error("Error loading nav:", err);
    }
}

function setActiveMenu() {
    const links = document.querySelectorAll(".app-nav a");
    const current = window.location.pathname;

    links.forEach(link => {
        if (link.getAttribute("href") === current) {
            link.classList.add("active");
        }
    });
}

async function getUserRole(userId) {
    // ✅ แก้จาก "users" เป็น "profiles"
    const { data, error } = await supabaseClient
        .from("profiles")
        .select("role")
        .eq("id", userId)
        .single();

    if (error) {
        console.error("ดึง role ไม่ได้:", error.message);
        return null;
    }

    console.log("PROFILE DATA =", data);
    return data?.role || null;
}

// รอให้ supabaseClient พร้อมก่อน
function waitForSupabaseClient(callback, maxAttempts = 50) {
    let attempts = 0;
    
    const check = () => {
        attempts++;
        
        if (typeof supabaseClient !== "undefined" && supabaseClient?.auth) {
            console.log("✅ supabaseClient พร้อมแล้ว");
            callback();
        } else if (attempts < maxAttempts) {
            setTimeout(check, 100);
        } else {
            console.error("❌ supabaseClient ไม่พร้อม หลังจากรอนานเกินไป");
        }
    };
    
    check();
}

async function initPage() {
    try {
        const { data: { user }, error } = await supabaseClient.auth.getUser();

        console.log("USER =", user);

        if (error || !user) {
            console.error("ไม่พบผู้ใช้หรือไม่ได้ login");
            return;
        }

        // อัพเดต UI แสดงชื่อผู้ใช้
        const userName = user.user_metadata?.full_name || user.email || "ผู้ใช้";
        const userNameEl = document.getElementById("userName");
if (userNameEl) {
    userNameEl.textContent = userName;
}

        // ดึง role จาก Supabase (ตาราง profiles)
        const role = await getUserRole(user.id);

        if (!role) {
            console.error("ไม่พบ role ของผู้ใช้");
            return;
        }

        console.log("✅ USER ROLE =", role);

        // โหลด nav ตาม role
        loadNav(role);

    } catch (err) {
        console.error("Error in initPage:", err);
    }
}

document.addEventListener("DOMContentLoaded", () => {
    waitForSupabaseClient(initPage);
});
</script>
    



</body>
</html>
