<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>การแจ้งเตือน</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/css/index.css">
  <link rel="stylesheet" href="/css/base/bassHeader.css">
  
  <style>
    .notif-container { max-width: 800px; margin: auto; padding: 16px; }
    .notif-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .notif-header h2 { margin: 0; }
    .notif-actions { display: flex; gap: 8px; }
    .notif-btn {
      padding: 8px 14px;
      border: 1px solid #ddd;
      background: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }
    .notif-btn:hover { background: #f5f5f5; }
    .notif-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .notif-badge {
      background: #ef4444;
      color: #fff;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
      margin-left: 6px;
    }
    .notif-item {
      padding: 12px 14px;
      margin-bottom: 10px;
      border-radius: 10px;
      background: #f5f5f5;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
      border: 1px solid transparent;
    }
    .notif-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .notif-item.unread {
      background: #fff3cd;
      border-color: #ffe08a;
    }
    .notif-title { font-weight: 600; margin-bottom: 4px; }
    .notif-message { font-size: 13px; color: #333; margin-bottom: 6px; }
    .notif-time { font-size: 11px; color: #999; }
    .notif-empty { text-align: center; color: #666; padding: 40px 0; }
    .notif-loading { text-align: center; color: #666; padding: 20px 0; }
    .notif-error {
      background: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .notif-row {
  display: flex;
  gap: 12px;
  align-items: flex-start;
}
.notif-icon {
  font-size: 24px;
  flex-shrink: 0;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #fff;
  border-radius: 50%;
}
.notif-body { flex: 1; min-width: 0; }
.notif-message {
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
  </style>
</head>
<body>

   <!-- ── HEADER ── -->
  <header class="app-header">
    <div class="logo">
      <div class="logo-circle"><img src="/assets/icons/icon-192.png" alt="logo"></div>
      <h2>EABaseHub</h2>
      <!-- <span class="admin-header-badge">👑 Executive</span> -->
    </div>
    <div class="user-box">
      <div class="user-avatar" id="userAvatar">👤</div>
      <div class="user-info">
        <div class="user-name" id="userName">กำลังโหลด...</div>
      </div>
      <div class="group">
        <span class="badge badge--message-sent" onclick="logout()">
          <span class="badge-icon">
            <span class="material-symbols-outlined" style="font-size:17px">logout</span>
          </span>
          ออกจากระบบ
        </span>
      </div>
    </div>
  </header>



  <div class="notif-container">
    <div class="notif-header">
      <h2>
        🔔 แจ้งเตือน
        <span id="unreadBadge" class="notif-badge" style="display:none;">0</span>
      </h2>
      <div class="notif-actions">
        <button id="markAllBtn" class="notif-btn">อ่านทั้งหมด</button>
        <button id="refreshBtn" class="notif-btn">รีเฟรช</button>
      </div>
    </div>

    <div id="notificationList">
      <div class="notif-loading">กำลังโหลด...</div>
    </div>
  </div>

 
  
  
  <!-- EXTERNAL SCRIPTS (โหลดตามลำดับ) -->
  <script src="/js/core/supabaseClient.js"></script>
  <script src="/js/core/userService.js"></script>
  <script src="/js/core/roleConfig.js"></script>
  <script src="/js/core/auth.js"></script>   
  <script src="/js/services/notifications.js"></script>
  <script src="/js/core/splash.js"></script>
  <script src="/js/core/loadingSplash.js"></script> 

</body>
</html>
